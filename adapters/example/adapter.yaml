# Adapter manifest — map each engine operation to a shell command for YOUR project.
#
# The engine calls:   scripts/evolve_adapter.py <op> key=value ...
# Each op below is a shell command run on evolve-brain. `{placeholders}` are filled from the
# key=value args; `$ENV` vars (from .env) resolve normally. The command itself does any ssh into
# the target host. Implement only the ops you need — omit the rest (an undefined op is a clean error).
#
# Point `EVOLVE_ADAPTER` in .env at the directory holding YOUR adapter.yaml (e.g. EVOLVE_ADAPTER=skipper).

# deploy host=<host> ref=<branch|sha> [repo=<owner/repo>]
#   Check out <ref> on <host> and bring the product up. SHOULD print a JSON line
#   {"ok":true,"healthy":true,"sha":"<sha>"} and exit 0 on success / non-zero on failure.
#
#   MULTI-REPO: when the engine passes repo=<owner/repo>, it also fills these placeholders from the
#   registry so ONE deploy op can handle any repo type:
#     {repo_type}   platform | app | model        {repo_path}     the repo's own checkout path
#     {staging_branch} {world_branch}              {host_repo}     (apps) the platform it deploys into
#     {clone_path}  e.g. apps/myunit               {clone_target}  abs path: <host_path>/<clone_path>
#   A platform repo deploys in place (below). An app/model repo builds in its own repo, then this op
#   clones the built branch INTO its host platform at {clone_target} and restarts — e.g.:
#     deploy: "ssh {host} 'set -e; if [ \"{repo_type}\" = platform ]; then cd {host_path:-~/myproject} && git fetch -q && git reset --hard -q && git clean -fdq && git checkout -qf {ref} && ./deploy.sh; else rm -rf {clone_target} && git clone -q -b {ref} <app-remote> {clone_target} && cd {host_path} && ./deploy.sh; fi'"
#   (Keep your own recipe; the point is the engine HANDS you repo_type + clone_target so you can branch on it.)
#   DIRTY-CHECKOUT SAFETY (learned in production): a plain `git checkout {ref}` ABORTS when an
#   untracked file on the host collides with a file tracked in {ref} — and if your command chain
#   doesn't stop there, the product comes up on STALE code and validation fails confusingly
#   (e.g. ImportError for code that was just merged). A validation host is DISPOSABLE: always
#   reset --hard + clean -fd before a forced checkout, sync a branch ref to its origin, and echo
#   the deployed sha so callers can verify the deploy actually moved. If your product's compose
#   uses anonymous volumes, also `docker volume prune -f` after a successful deploy on a disposable
#   host — each container recreation orphans them and repeated deploys fill the disk (tens of GB).
deploy: "ssh {host} 'cd ~/myproject && git fetch --all -q && git reset --hard -q && git clean -fdq && git checkout -qf {ref} && (git reset --hard -q origin/{ref} 2>/dev/null || true) && ./deploy.sh && echo {\"ok\":true,\"healthy\":true,\"sha\":\"$(git rev-parse --short HEAD)\"}'"

# health host=<host>
#   Exit 0 if the product is up on <host>, non-zero otherwise.
health: "ssh {host} 'curl -fsS http://localhost:8000/health >/dev/null'"

# acceptance host=<host> spec=<spec-id|file>
#   Drive the product as a user and judge it against <spec>. SHOULD print JSON
#   {"passed":true,"evidence":["<url-or-note>", ...]} and exit 0/non-zero. For a project with no UI,
#   this can simply run your test suite. (run_acceptance.py here is illustrative — write your own.)
acceptance: "EVOLVE_TARGET_HOST={host} python3 adapters/example/run_acceptance.py {spec}"

# prepare host=<host>         # (recommended for multi-repo) stand the test host up FROM SCRATCH so the
#   AGENTS never improvise test setup: clone the platform + every registered app (at its branch) from
#   git, build, seed mock data, ensure the test login user exists. The agents run this before
#   reproduce/validate. Best as a script that reads the registry (write your own adapters/<name>/prepare_test_host.py).
#   The test host needs READ-ONLY git access to all your repos for this (a fine-grained read PAT).
# prepare: "python3 adapters/myproject/prepare_test_host.py {host}"

# seed host=<host>            # (optional) load fixtures / mock data so acceptance has a known start.
# seed: "ssh {host} 'cd ~/myproject && ./seed.sh'"

# scaffold unit=<name>        # (optional) scaffold a new unit of work (a new app/module/package).
# scaffold: "python3 adapters/example/scaffold.py {unit}"
